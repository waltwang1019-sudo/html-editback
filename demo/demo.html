<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EditBack Demo</title>
  <style>
    :root { --bg: #f4ebd8; --ink: #20201e; --blue: #3d4470; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #1a1a1e; font-family: "PingFang SC", system-ui, sans-serif; color: var(--ink); }
    .book { max-width: 960px; margin: 48px auto; padding: 0 20px 96px; display: flex; flex-direction: column; gap: 28px; }
    .pg {
      background: var(--bg);
      border-radius: 16px;
      padding: 52px;
      box-shadow: 0 24px 64px rgba(0,0,0,.45);
      min-height: 320px;
    }
    .pg h1 { font-size: 40px; color: var(--blue); margin-bottom: 14px; letter-spacing: -.02em; }
    .pg p { font-size: 17px; line-height: 1.75; color: #3c3a36; margin-bottom: 10px; }
    .pg .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 28px; }
    .pg .card { background: #fff; border: 1px solid #d4c8ae; border-radius: 12px; padding: 22px; }
    .pg .card h3 { color: var(--blue); margin-bottom: 8px; font-size: 18px; }
    .pg img { width: 100%; max-width: 300px; border-radius: 10px; margin-top: 20px; }
    @media print {
      html, body { background: #fff; }
      .book { max-width: none; margin: 0; padding: 0; gap: 0; }
      .pg { box-shadow: none; border-radius: 0; page-break-after: always; }
    }
  </style>
  <link rel="stylesheet" href="../dist/editback.css">
</head>
<body>
  <div class="book" data-editback-root>
    <div class="pg">
      <h1>EditBack 演示</h1>
      <p>点击右上角铅笔图标打开工具栏，再点「开始编辑」进入编辑模式。</p>
      <p>文字直接点击修改；模块点击后可移动、缩放、复制或删除。</p>
      <p>快捷键：E 编辑 · ⌘/Ctrl+S 保存 · ⌘/Ctrl+P 打印</p>
    </div>
    <div class="pg">
      <h1>示例页面</h1>
      <p>在 Chrome / Edge 中保存可直接写回本地 HTML 文件。</p>
      <div class="cards">
        <div class="card"><h3>模块 A</h3><p>选中后可拖动位置。</p></div>
        <div class="card"><h3>模块 B</h3><p>支持复制与缩放。</p></div>
        <div class="card"><h3>模块 C</h3><p>删除后有 5 秒撤销。</p></div>
      </div>
      <img src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='560' height='320' viewBox='0 0 560 320'%3E%3Crect fill='%23EADFC2' width='560' height='320' rx='12'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%233D4470' font-family='system-ui' font-size='20'%3E选中图片可替换%3C/text%3E%3C/svg%3E" alt="占位图">
    </div>
  </div>
  <script>
    window.EDITBACK_CONFIG = {
      root: "[data-editback-root]",
      locale: "zh",
      accentColor: "#F56A21",
      restoreDraft: true,
    };
  </script>
  <script src="../dist/editback.js"></script>
</body>
</html>
